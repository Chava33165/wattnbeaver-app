name: wattnbeaver
description: "WattBeaver - Monitoreo IoT de energia y agua con gamificacion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.0

  # State Management
  provider: ^6.1.1

  # MQTT
  mqtt_client: ^10.2.0

  # Storage
  shared_preferences: ^2.2.2

  # Auth
  jwt_decoder: ^2.0.1

  # Charts
  fl_chart: ^0.66.0

  # UI
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Date/Time
  intl: ^0.19.0
  timeago: ^3.6.0

  # Utilities
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.0
  app_settings: ^5.1.1

  # Icons
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/watt.jpeg"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
