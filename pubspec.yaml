name: wattnbeaver
description: "WattBeaver - Monitoreo IoT de energia y agua con gamificacion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.0

  # State Management
  provider: ^6.1.1

  # MQTT
  mqtt_client: ^10.2.0

  # Storage
  shared_preferences: ^2.2.2

  # Auth
  jwt_decoder: ^2.0.1

  # Charts
  fl_chart: ^0.66.0

  # UI
  shimmer: ^3.0.0

  # Date/Time
  intl: ^0.19.0
  timeago: ^3.6.0

  # Utilities
  connectivity_plus: ^5.0.2

  # Icons
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
